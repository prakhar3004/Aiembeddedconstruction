services:
  - type: web
    name: nirmansahyak-backend
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      # Strong secret auto-generated by Render (rotates the old weak committed value)
      - key: JWT_SECRET
        generateValue: true
      # Supabase Postgres connection string (set in the Render dashboard — secret)
      - key: DATABASE_URL
        sync: false
      # Comma-separated list of allowed frontend origins, e.g. https://your-app.vercel.app
      - key: ALLOWED_ORIGINS
        sync: false
      # AI provider (clod.io). Key is secret; model has a safe default.
      - key: CLOD_API_KEY
        sync: false
      - key: CLOD_MODEL
        value: GPT OSS 120B
      # Optional alternate AI providers
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
